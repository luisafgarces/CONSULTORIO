<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentFlow — Salud & Bienestar</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #cd8e9d;
    --sage-light: #e8b8c5;
    --cream: #fadae1;
    --warm: #f5e8ec;
    --earth: #9a6070;
    --dark: #643000;
    --accent: #cd8e9d;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
  }

  /* Background texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      radial-gradient(circle at 20% 20%, rgba(205,142,157,0.15) 0%, transparent 50%),
      radial-gradient(circle at 80% 80%, rgba(250,218,225,0.30) 0%, transparent 50%),
      radial-gradient(circle at 60% 10%, rgba(205,142,157,0.10) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 780px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeDown 0.7s ease both;
  }

  .logo-tag {
    display: inline-flex;
    align-items: center;
    margin-bottom: 20px;
    padding: 8px 20px 8px 12px;
    background: rgba(250,218,225,0.6);
    border: 1px solid rgba(205,142,157,0.3);
    border-radius: 40px;
  }

  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3rem);
    font-weight: 400;
    line-height: 1.2;
    color: var(--dark);
    margin-bottom: 12px;
  }

  h1 em {
    font-style: italic;
    color: var(--sage);
  }

  header p {
    color: var(--earth);
    font-size: 15px;
    font-weight: 300;
    max-width: 420px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Card */
  .card {
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.9);
    border-radius: 20px;
    padding: 36px;
    box-shadow: 0 4px 40px rgba(44,36,32,0.07);
    animation: fadeUp 0.7s ease 0.15s both;
  }

  .section-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--earth);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--warm);
  }

  /* Network selector */
  .network-selector {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }

  .net-btn {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--warm);
    border-radius: 12px;
    background: white;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--earth);
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .net-btn:hover { border-color: var(--sage); color: var(--sage); }

  .net-btn.active {
    background: var(--sage);
    border-color: var(--sage);
    color: white;
    box-shadow: 0 4px 16px rgba(122,158,126,0.3);
  }

  .net-btn svg { width: 18px; height: 18px; }

  /* Content type chips */
  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 28px;
  }

  .chip {
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid var(--warm);
    background: white;
    font-size: 13px;
    font-weight: 400;
    color: var(--earth);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: var(--accent); border-color: var(--accent); color: white; }

  /* Input */
  .input-group { margin-bottom: 24px; }

  textarea, input[type=text] {
    width: 100%;
    border: 1.5px solid var(--warm);
    border-radius: 12px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--dark);
    background: white;
    resize: none;
    outline: none;
    transition: border-color 0.2s;
    line-height: 1.6;
  }

  textarea:focus, input[type=text]:focus { border-color: var(--sage); }
  textarea { min-height: 90px; }

  textarea::placeholder, input::placeholder { color: #bbb; }

  /* Tone row */
  .tone-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 28px;
  }

  .tone-chip {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--warm);
    background: white;
    font-size: 12px;
    color: var(--earth);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .tone-chip.active { background: var(--earth); border-color: var(--earth); color: white; }

  /* Generate button */
  .btn-generate {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #cd8e9d 0%, #b8708a 100%);
    border: none;
    border-radius: 14px;
    color: white;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    box-shadow: 0 4px 20px rgba(205,142,157,0.4);
    letter-spacing: 0.3px;
  }

  .btn-generate:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(205,142,157,0.5);
  }

  .btn-generate:active { transform: translateY(0); }

  .btn-generate:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  /* Result */
  .result-card {
    margin-top: 28px;
    border: 1.5px solid rgba(205,142,157,0.25);
    border-radius: 16px;
    background: rgba(250,218,225,0.15);
    overflow: hidden;
    display: none;
    animation: fadeUp 0.4s ease both;
  }

  .result-header {
    padding: 14px 20px;
    background: rgba(205,142,157,0.1);
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(205,142,157,0.15);
  }

  .result-header span {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--sage);
  }

  .result-actions {
    display: flex;
    gap: 8px;
  }

  .btn-small {
    padding: 6px 14px;
    border-radius: 8px;
    border: 1.5px solid rgba(205,142,157,0.3);
    background: white;
    font-size: 12px;
    font-weight: 500;
    color: var(--sage);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .btn-small:hover { background: var(--sage); color: white; border-color: var(--sage); }

  .btn-small.accent {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .btn-small.accent:hover { opacity: 0.85; }

  .result-body {
    padding: 20px;
  }

  #output-text {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.75;
    color: var(--dark);
    white-space: pre-wrap;
    min-height: 60px;
  }

  .result-body .cursor {
    display: inline-block;
    width: 2px;
    height: 16px;
    background: var(--sage);
    vertical-align: middle;
    animation: blink 1s infinite;
  }

  /* Copy toast */
  .toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--dark);
    color: white;
    padding: 12px 24px;
    border-radius: 30px;
    font-size: 13px;
    font-weight: 500;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 100;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* History */
  .history-section {
    margin-top: 40px;
    animation: fadeUp 0.5s ease 0.3s both;
  }

  .history-grid {
    display: grid;
    gap: 12px;
    margin-top: 16px;
  }

  .history-item {
    background: white;
    border: 1.5px solid var(--warm);
    border-radius: 12px;
    padding: 16px 18px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }

  .history-item:hover { border-color: #e8b8c5; transform: translateY(-1px); }

  .history-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }

  .hist-tag {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 6px;
    background: var(--warm);
    color: var(--earth);
  }

  .hist-tag.ig { background: rgba(205,142,157,0.12); color: var(--accent); }
  .hist-tag.wa { background: rgba(205,142,157,0.08); color: var(--earth); }

  .history-item p {
    font-size: 13px;
    color: #777;
    line-height: 1.5;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .hist-copy {
    position: absolute;
    top: 12px;
    right: 12px;
    opacity: 0;
    transition: opacity 0.2s;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--sage);
    font-size: 13px;
  }

  .history-item:hover .hist-copy { opacity: 1; }

  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-tag">
      <!-- Logo SVG basado en el logo de Luisa -->
      <svg width="36" height="36" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline-block;vertical-align:middle;margin-right:10px">
        <circle cx="22" cy="18" r="9" stroke="#cd8e9d" stroke-width="2.2" fill="none"/>
        <circle cx="36" cy="18" r="9" stroke="#cd8e9d" stroke-width="2.2" fill="none"/>
        <circle cx="29" cy="30" r="9" stroke="#cd8e9d" stroke-width="2.2" fill="none"/>
        <path d="M29 39 Q26 46 29 52" stroke="#cd8e9d" stroke-width="2.2" fill="none" stroke-linecap="round"/>
        <path d="M29 52 Q34 56 31 52" stroke="#cd8e9d" stroke-width="2" fill="none" stroke-linecap="round"/>
      </svg>
      <span style="font-family:'Playfair Display',serif;font-size:13px;color:#643000;letter-spacing:1px;">Luisa Fernanda Garcés García</span>
    </div>
    <h1>Tu contenido,<br><em>sin el estrés</em></h1>
    <p>Generá textos listos para Instagram y WhatsApp en segundos. Solo describí qué querés comunicar.</p>
  </header>

  <div class="card">

    <!-- Red social -->
    <div class="section-label">Red social</div>
    <div class="network-selector" id="networkSelector">
      <button class="net-btn active" data-net="instagram" onclick="selectNet(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor"/></svg>
        Instagram
      </button>
      <button class="net-btn" data-net="whatsapp" onclick="selectNet(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
        WhatsApp
      </button>
    </div>

    <!-- Tipo de contenido -->
    <div class="section-label">¿Qué tipo de post?</div>
    <div class="chips" id="typeChips">
      <button class="chip active" data-type="consejo" onclick="selectChip(this)">💡 Consejo práctico</button>
      <button class="chip" data-type="promocion" onclick="selectChip(this)">🎯 Promoción</button>
      <button class="chip" data-type="testimonio" onclick="selectChip(this)">⭐ Testimonio</button>
      <button class="chip" data-type="educativo" onclick="selectChip(this)">📚 Educativo</button>
      <button class="chip" data-type="presentacion" onclick="selectChip(this)">👋 Presentación</button>
      <button class="chip" data-type="motivacion" onclick="selectChip(this)">🌿 Motivación</button>
    </div>

    <!-- Tema -->
    <div class="section-label">¿Sobre qué?</div>
    <div class="input-group">
      <textarea id="topicInput" placeholder="Ej: Los beneficios del descanso para bajar el estrés, o que ofrezco sesiones de nutrición online..."></textarea>
    </div>

    <!-- Tono -->
    <div class="section-label">Tono</div>
    <div class="tone-row" id="toneChips">
      <button class="tone-chip active" data-tone="cercano" onclick="selectTone(this)">Cercano</button>
      <button class="tone-chip" data-tone="profesional" onclick="selectTone(this)">Profesional</button>
      <button class="tone-chip" data-tone="inspirador" onclick="selectTone(this)">Inspirador</button>
      <button class="tone-chip" data-tone="divertido" onclick="selectTone(this)">Divertido</button>
    </div>

    <!-- Botón -->
    <button class="btn-generate" id="generateBtn" onclick="generateContent()">
      <span id="btnText">✦ Generar contenido</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <!-- Resultado -->
    <div class="result-card" id="resultCard">
      <div class="result-header">
        <span>✦ Tu post</span>
        <div class="result-actions">
          <button class="btn-small" onclick="regenerate()">↺ Otro</button>
          <button class="btn-small accent" onclick="copyResult()">📋 Copiar</button>
        </div>
      </div>
      <div class="result-body">
        <div id="output-text"></div>
      </div>
    </div>

  </div><!-- /card -->

  <!-- Historial -->
  <div class="history-section" id="historySection" style="display:none">
    <div class="section-label">Generados hoy</div>
    <div class="history-grid" id="historyGrid"></div>
  </div>

</div><!-- /container -->

<div class="toast" id="toast">✓ ¡Copiado!</div>

<script>
let selectedNet = 'instagram';
let selectedType = 'consejo';
let selectedTone = 'cercano';
let history = [];
let currentResult = '';

function selectNet(btn) {
  document.querySelectorAll('.net-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedNet = btn.dataset.net;
}

function selectChip(btn) {
  document.querySelectorAll('#typeChips .chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedType = btn.dataset.type;
}

function selectTone(btn) {
  document.querySelectorAll('#toneChips .tone-chip').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  selectedTone = btn.dataset.tone;
}

async function generateContent() {
  const topic = document.getElementById('topicInput').value.trim();
  if (!topic) {
    document.getElementById('topicInput').focus();
    document.getElementById('topicInput').style.borderColor = 'var(--accent)';
    setTimeout(() => document.getElementById('topicInput').style.borderColor = '', 1500);
    return;
  }

  const btn = document.getElementById('generateBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  btn.disabled = true;
  btnText.style.display = 'none';
  spinner.style.display = 'block';

  const resultCard = document.getElementById('resultCard');
  const outputText = document.getElementById('output-text');
  resultCard.style.display = 'block';
  outputText.innerHTML = '<span class="cursor"></span>';

  const typeLabels = {
    consejo: 'consejo práctico',
    promocion: 'publicación promocional',
    testimonio: 'post con testimonio de cliente',
    educativo: 'post educativo',
    presentacion: 'presentación personal/profesional',
    motivacion: 'mensaje motivacional'
  };

  const netInstructions = selectedNet === 'instagram'
    ? 'para Instagram: usa emojis, hashtags relevantes al final (5-8), llamado a la acción. Máximo 300 palabras.'
    : 'para WhatsApp Business: directo, cálido, sin hashtags, con emoji ocasional. Máximo 200 palabras. Puede terminar con una invitación a responder.';

  const prompt = `Sos un experto en marketing de salud y bienestar. Creá un ${typeLabels[selectedType]} ${netInstructions}

Tema: "${topic}"
Tono: ${selectedTone}

El contenido debe ser auténtico, valioso, y posicionar al profesional de salud/bienestar como referente. Solo escribí el texto del post, sin explicaciones ni comillas al inicio/final.`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        messages: [{ role: "user", content: prompt }]
      })
    });

    const data = await response.json();
    const text = data.content.map(i => i.text || '').join('');

    // Animate text reveal
    outputText.textContent = '';
    let i = 0;
    const interval = setInterval(() => {
      outputText.textContent += text[i];
      i++;
      if (i >= text.length) {
        clearInterval(interval);
        currentResult = text;
        addToHistory(text);
      }
    }, 10);

  } catch (err) {
    outputText.textContent = 'Ocurrió un error al generar el contenido. Por favor intentá de nuevo.';
  } finally {
    btn.disabled = false;
    btnText.style.display = 'inline';
    spinner.style.display = 'none';
  }
}

function regenerate() { generateContent(); }

function copyResult() {
  if (!currentResult) return;
  navigator.clipboard.writeText(currentResult).then(() => showToast());
}

function showToast() {
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function addToHistory(text) {
  const netTag = selectedNet === 'instagram' ? 'ig' : 'wa';
  const netLabel = selectedNet === 'instagram' ? 'Instagram' : 'WhatsApp';
  history.unshift({ text, netTag, netLabel, type: selectedType });
  if (history.length > 5) history.pop();
  renderHistory();
}

function renderHistory() {
  const section = document.getElementById('historySection');
  const grid = document.getElementById('historyGrid');
  section.style.display = 'block';
  grid.innerHTML = history.map((item, idx) => `
    <div class="history-item" onclick="loadHistory(${idx})">
      <div class="history-meta">
        <span class="hist-tag ${item.netTag}">${item.netLabel}</span>
        <span class="hist-tag">${item.type}</span>
      </div>
      <p>${item.text}</p>
      <button class="hist-copy" onclick="copyHist(event,${idx})">📋</button>
    </div>
  `).join('');
}

function loadHistory(idx) {
  const item = history[idx];
  currentResult = item.text;
  document.getElementById('output-text').textContent = item.text;
  document.getElementById('resultCard').style.display = 'block';
  window.scrollTo({ top: 400, behavior: 'smooth' });
}

function copyHist(e, idx) {
  e.stopPropagation();
  navigator.clipboard.writeText(history[idx].text).then(() => showToast());
}
</script>
</body>
</html>
